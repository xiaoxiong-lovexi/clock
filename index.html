<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Clock</title>
<style>
  body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f8f9fa;
    font-family:Consolas,monospace;
  }
  .box{
    text-align:center;
  }
  .time{
    font-size:36px;
    font-weight:bold;
    color:#2c3e50;
    letter-spacing:3px;
  }
  .date{
    font-size:14px;
    color:#888;
    margin-top:6px;
  }
  svg{
    display:block;
    margin:0 auto 10px;
  }
  line{
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.15));
  }
</style>
</head>
<body>
<div class="box">
  <svg width="200" height="200" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="95" fill="#fff" stroke="#ccc" stroke-width="3"/>
    <line x1="100" y1="100" x2="100" y2="40" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" id="hour"/>
    <line x1="100" y1="100" x2="100" y2="30" stroke="#3498db" stroke-width="3" stroke-linecap="round" id="min"/>
    <line x1="100" y1="100" x2="100" y2="25" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" id="sec"/>
    <circle cx="100" cy="100" r="5" fill="#333"/>
  </svg>
  <div class="time" id="t"></div>
  <div class="date" id="d"></div>
</div>

<script>
function tick(){
  var n=new Date();
  var h=n.getHours()%12,v=n.getMinutes(),s=n.getSeconds();
  var hs=h*30+v*0.5+s/120;
  var ms=v*6+s/10;
  var ss=s*6;
  document.getElementById('hour').setAttribute('transform','rotate('+hs+' 100 100)');
  document.getElementById('min').setAttribute('transform','rotate('+ms+' 100 100)');
  document.getElementById('sec').setAttribute('transform','rotate('+ss+' 100 100)');
  var hh=String(n.getHours()).padStart(2,'0');
  var mm=String(v).padStart(2,'0');
  var ss2=String(s).padStart(2,'0');
  document.getElementById('t').innerText=hh+':'+mm+':'+ss2;
  var y=n.getFullYear(),mo=n.getMonth()+1,dd=n.getDate();
  var w=['日','一','二','三','四','五','六'][n.getDay()];
  document.getElementById('d').innerText=y+'年'+mo+'月'+dd+'日 星期'+w;
}
tick();
setInterval(tick,1000);
</script>
</body>
</html>
