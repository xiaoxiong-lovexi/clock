<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>实时时钟</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:linear-gradient(135deg,#0c0c1d,#1a1a3e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Consolas','Courier New',monospace;
  }
  .container{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px 40px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    text-align:center;
    max-width:420px;
  }
  .clock-title{
    color:#64d8ff;
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(100,216,255,0.3);
  }
  .clock-face{
    position:relative;
    width:240px;
    height:240px;
    margin:0 auto 20px;
  }
  .clock-face svg{
    width:100%;
    height:100%;
  }
  .digital-time{
    font-size:48px;
    font-weight:bold;
    color:#fff;
    letter-spacing:3px;
    text-shadow:0 0 30px rgba(100,216,255,0.5);
    margin:10px 0 5px;
  }
  .digital-date{
    font-size:16px;
    color:rgba(255,255,255,0.6);
    letter-spacing:2px;
    margin-bottom:15px;
  }
  .quote-box{
    background:rgba(255,255,255,0.03);
    border-left:3px solid #64d8ff;
    padding:12px 16px;
    margin-top:15px;
    border-radius:0 8px 8px 0;
    text-align:left;
  }
  .quote-text{
    color:rgba(255,255,255,0.85);
    font-size:13px;
    font-style:italic;
    line-height:1.6;
  }
  .quote-author{
    color:#64d8ff;
    font-size:12px;
    margin-top:6px;
    text-align:right;
  }
  .footer{
    color:rgba(255,255,255,0.2);
    font-size:10px;
    margin-top:18px;
    letter-spacing:2px;
  }
  .scroll-deco{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:8px 0;
  }
  .scroll-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(100,216,255,0.3);
    animation:pulse 2s ease-in-out infinite;
  }
  .scroll-dot:nth-child(2){animation-delay:0.3s;}
  .scroll-dot:nth-child(3){animation-delay:0.6s;}
  @keyframes pulse{
    0%,100%{opacity:0.3;transform:scale(1);}
    50%{opacity:1;transform:scale(1.3);}
  }
</style>
</head>
<body>
<div class="container">
  <div class="clock-title">⚡ Real-Time Clock</div>
  
  <div class="clock-face">
    <svg viewBox="0 0 240 240">
      <!-- 外圈 -->
      <circle cx="120" cy="120" r="115" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
      <circle cx="120" cy="120" r="110" fill="rgba(255,255,255,0.02)" stroke="rgba(100,216,255,0.15)" stroke-width="1"/>
      
      <!-- 主刻度 -->
      <g stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round">
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(0,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(30,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(60,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(90,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(120,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(150,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(180,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(210,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(240,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(270,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(300,120,120)"/>
        <line x1="120" y1="18" x2="120" y2="30" transform="rotate(330,120,120)"/>
      </g>
      
      <!-- 副刻度 -->
      <g stroke="rgba(255,255,255,0.2)" stroke-width="1">
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(15,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(45,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(75,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(105,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(135,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(165,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(195,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(225,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(255,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(285,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(315,120,120)"/>
        <line x1="120" y1="22" x2="120" y2="28" transform="rotate(345,120,120)"/>
      </g>
      
      <!-- 数字 -->
      <g fill="rgba(255,255,255,0.8)" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">
        <text x="120" y="50">12</text>
        <text x="155" y="63">1</text>
        <text x="177" y="92">2</text>
        <text x="187" y="125">3</text>
        <text x="178" y="158">4</text>
        <text x="156" y="186">5</text>
        <text x="120" y="198">6</text>
        <text x="84" y="188">7</text>
        <text x="62" y="161">8</text>
        <text x="51" y="128">9</text>
        <text x="62" y="95">10</text>
        <text x="86" y="66">11</text>
      </g>
      
      <!-- 时针（由JS控制） -->
      <line x1="120" y1="130" x2="120" y2="72" stroke="#64d8ff" stroke-width="5" stroke-linecap="round" id="hourHand"/>
      
      <!-- 分针（由JS控制） -->
      <line x1="120" y1="133" x2="120" y2="57" stroke="#7cffcb" stroke-width="3.5" stroke-linecap="round" id="minHand"/>
      
      <!-- 秒针（由JS控制） -->
      <line x1="120" y1="136" x2="120" y2="44" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" id="secHand"/>
      
      <!-- 中心点 -->
      <circle cx="120" cy="120" r="5" fill="#64d8ff"/>
      <circle cx="120" cy="120" r="2" fill="#fff"/>
    </svg>
  </div>
  
  <div class="digital-time" id="digitalTime">00:00:00</div>
  <div class="digital-date" id="digitalDate">Loading...</div>
  
  <div class="scroll-deco">
    <div class="scroll-dot"></div>
    <div class="scroll-dot"></div>
    <div class="scroll-dot"></div>
    <div class="scroll-dot"></div>
    <div class="scroll-dot"></div>
  </div>
  
  <div class="quote-box">
    <div class="quote-text" id="quoteText">"Loading..."</div>
    <div class="quote-author" id="quoteAuthor">— Loading</div>
  </div>
  
  <div class="footer">✦ C++ &lt;chrono&gt; ✦</div>
</div>

<script>
// C++名言库
const quotes = [
  {text: "C makes it easy to shoot yourself in the foot; C++ makes it harder, but when you do, it blows away your whole leg.", author: "Bjarne Stroustrup"},
  {text: "Within C++, there is a much smaller and cleaner language struggling to get out.", author: "Bjarne Stroustrup"},
  {text: "The only way to learn a new programming language is by writing programs in it.", author: "Dennis Ritchie"},
  {text: "First solve the problem, then write the code.", author: "John Johnson"},
  {text: "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", author: "Martin Fowler"},
  {text: "Programming is not about typing, it's about thinking.", author: "Andy Hunt"},
  {text: "The best error message is the one that never shows up.", author: "Thomas Fuchs"},
  {text: "Simplicity is prerequisite for reliability.", author: "Edsger Dijkstra"},
  {text: "Make it work, make it right, make it fast.", author: "Kent Beck"},
  {text: "C++: where friends can access your private parts.", author: "Unknown"}
];

// 更新时钟指针和数字
function updateClock(){
  var now = new Date();
  var h = now.getHours() % 12;
  var m = now.getMinutes();
  var s = now.getSeconds();
  var ms = now.getMilliseconds();
  
  // 计算指针角度
  var secAngle = s * 6 + ms * 0.006;  // 秒针平滑移动
  var minAngle = m * 6 + s * 0.1;     // 分针平滑移动
  var hourAngle = h * 30 + m * 0.5 + s * 0.00833;  // 时针平滑移动
  
  // 应用旋转
  document.getElementById('secHand').setAttribute('transform', 'rotate(' + secAngle + ' 120 134)');
  document.getElementById('minHand').setAttribute('transform', 'rotate(' + minAngle + ' 120 129)');
  document.getElementById('hourHand').setAttribute('transform', 'rotate(' + hourAngle + ' 120 126)');
  
  // 更新数字时间
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(m).padStart(2,'0');
  var ss = String(s).padStart(2,'0');
  document.getElementById('digitalTime').innerText = hh + ':' + mm + ':' + ss;
  
  // 更新日期
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('digitalDate').innerText = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}

// 随机名言
function randomQuote(){
  var idx = Math.floor(Math.random() * quotes.length);
  document.getElementById('quoteText').innerText = '"' + quotes[idx].text + '"';
  document.getElementById('quoteAuthor').innerText = '— ' + quotes[idx].author;
}

// 启动
updateClock();
randomQuote();
setInterval(updateClock, 50);  // 每50ms刷新一次，指针平滑移动
setInterval(randomQuote, 10000);  // 每10秒换名言
</script>
</body>
</html>
